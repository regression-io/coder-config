name: Publish Beta

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  publish-beta:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for commit count

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Generate beta version
        id: version
        run: |
          # Get base version from package.json (e.g., 0.46.0)
          BASE_VERSION=$(node -p "require('./package.json').version.split('-')[0]")

          # Count commits since last stable tag
          LAST_STABLE=$(git describe --tags --match "v[0-9]*.[0-9]*.[0-9]" --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_STABLE" ]; then
            COMMIT_COUNT=$(git rev-list ${LAST_STABLE}..HEAD --count)
          else
            COMMIT_COUNT=$(git rev-list HEAD --count)
          fi

          # Generate beta version: 0.46.0-beta.123
          BETA_VERSION="${BASE_VERSION}-beta.${COMMIT_COUNT}"

          echo "base=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "beta=$BETA_VERSION" >> $GITHUB_OUTPUT
          echo "Generated beta version: $BETA_VERSION"

      - name: Update version for beta
        env:
          BETA_VERSION: ${{ steps.version.outputs.beta }}
        run: |
          # Update package.json with beta version
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = process.env.BETA_VERSION;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Sync to other files
          npm run version:sync --silent

      - name: Install and build
        run: npm install && npm run build:ci

      - name: Run tests
        run: npm test

      - name: Publish beta to npm
        run: npm publish --access public --tag beta --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        env:
          BETA_VERSION: ${{ steps.version.outputs.beta }}
        run: |
          echo "## 🚀 Beta Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${BETA_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm install -g coder-config@beta" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
