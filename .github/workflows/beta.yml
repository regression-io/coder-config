name: Publish Beta

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  publish-beta:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Generate beta version
        id: version
        run: |
          # Get current version from package.json
          CURRENT=$(node -p "require('./package.json').version")

          # Strip any existing -beta suffix to get base
          BASE=$(echo "$CURRENT" | sed 's/-beta$//')

          # Parse major.minor.patch
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)

          # Increment patch and add -beta
          NEW_PATCH=$((PATCH + 1))
          BETA_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}-beta"

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "beta=$BETA_VERSION" >> $GITHUB_OUTPUT
          echo "Generated beta version: $BETA_VERSION (was $CURRENT)"

      - name: Update version for beta
        env:
          BETA_VERSION: ${{ steps.version.outputs.beta }}
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = process.env.BETA_VERSION;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm run version:sync --silent

      - name: Install and build
        run: npm install && npm run build:ci

      - name: Run tests
        run: npm test

      - name: Publish beta to npm
        run: npm publish --access public --tag beta --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        env:
          BETA_VERSION: ${{ steps.version.outputs.beta }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json lib/constants.js ui/package.json
          git commit -m "chore: bump version to ${BETA_VERSION} [skip ci]" || echo "No changes to commit"
          git push

      - name: Summary
        env:
          BETA_VERSION: ${{ steps.version.outputs.beta }}
        run: |
          echo "## 🚀 Beta Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${BETA_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm install -g coder-config@beta" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
